<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | Campus Market SA</title>

<link rel="stylesheet" href="stylee.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<a href="index.html" class="back-home">

<i class="fa-solid fa-arrow-left"></i>

Home

</a>

<section class="register-page">

<div class="register-container">

<!-- LEFT SIDE -->

<div class="register-left">

<div class="register-logo">

<i class="fa-solid fa-store"></i>

<span>Campus Market SA</span>

</div>

<h1>Contact Us</h1>

<p>

Have questions, suggestions or need assistance?

We're here to help South African students.

</p>

<div class="register-features">

<div class="feature">

<i class="fa-solid fa-phone"></i>

<span>+27 12 345 6789</span>

</div>

<div class="feature">

<i class="fa-solid fa-envelope"></i>

<span>support@campusmarketsa.co.za</span>

</div>

<div class="feature">

<i class="fa-solid fa-location-dot"></i>

<span>Pretoria, South Africa</span>

</div>

<div class="feature">

<i class="fa-solid fa-clock"></i>

<span>Mon - Fri | 08:00 - 17:00</span>

</div>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="register-right">

<h2>Send us a Message</h2>

<form id="contactForm">

<div class="input-box">

<label>Full Name</label>

<input
type="text"
id="fullName"
placeholder="Enter your full name">

</div>

<div class="input-box">

<label>Email</label>

<input
type="email"
id="contactEmail"
placeholder="Enter your email">

</div>

<div class="input-box">

<label>Subject</label>

<input
type="text"
id="subject"
placeholder="Subject">

</div>

<div class="input-box">

<label>Your Message</label>

<textarea
id="message"
rows="6"
placeholder="Type your message"></textarea>

</div>

<button
type="submit"
class="btn-primary">

<i class="fa-solid fa-paper-plane"></i>

Send Message

</button>

</form>

</div>

</div>

</section>

<script src="scriptss.js"></script>

</body>

</html>
