<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sell Item | Campus Market SA</title>

<link rel="stylesheet" href="stylee.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<a href="marketplace.html" class="back-home">

<i class="fa-solid fa-arrow-left"></i>

Back to Marketplace

</a>

<section class="register-page">

<div class="register-container">

<!-- LEFT SIDE -->

<div class="register-left">

<div class="register-logo">

<i class="fa-solid fa-store"></i>

<span>Campus Market SA</span>

</div>

<h1>Sell Your Item</h1>

<p>

Turn your unused study materials into cash.

Sell textbooks, laptops, calculators, phones,

programming notes and more.

</p>

<div class="register-features">

<div class="feature">

<i class="fa-solid fa-book"></i>

<span>Sell Textbooks</span>

</div>

<div class="feature">

<i class="fa-solid fa-laptop"></i>

<span>Sell Electronics</span>

</div>

<div class="feature">

<i class="fa-solid fa-calculator"></i>

<span>Sell Calculators</span>

</div>

<div class="feature">

<i class="fa-solid fa-graduation-cap"></i>

<span>Help Other Students</span>

</div>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="register-right">

<h2>Post Your Product</h2>

<form id="sellForm">

<div class="input-box">

<label>Product Name</label>

<input
type="text"
id="productName"
placeholder="Enter product name">

</div>

<div class="input-box">

<label>Category</label>

<select id="category">

<option value="">Select Category</option>

<option>Programming</option>

<option>Computational Mathematics</option>

<option>Communication & Academic Purposes</option>

<option>Computer Fundamentals</option>

<option>Laptop</option>

<option>Phone</option>

<option>Calculator</option>

</select>

</div>

<div class="input-box">

<label>Price (R)</label>

<input
type="number"
id="price"
placeholder="Enter price">

</div>

<div class="input-box">

<label>Description</label>

<textarea
id="description"
rows="5"
placeholder="Describe your product"></textarea>

</div>

<div class="input-box">

<label>University</label>

<select id="sellerUniversity">

<option value="">Select University</option>

<option>TUT</option>

<option>UP</option>

<option>UJ</option>

<option>UNISA</option>

<option>UL</option>

</select>

</div>

<div class="input-box">

<label>Contact Number</label>

<input
type="tel"
id="sellerPhone"
placeholder="1234567893">

</div>

<div class="input-box">

<label>Email</label>

<input
type="email"
id="sellerEmail"
placeholder="example@gmail.com">

</div>

<div class="input-box">

<label>Upload Product Image</label>

<input
type="file"
id="productImage"
accept="image/*">

</div>

<button
type="submit"
class="btn-primary">

<i class="fa-solid fa-upload"></i>

Post Product

</button>

</form>

</div>

</div>

</section>

<script src="scriptss.js"></script>

</body>

</html>
